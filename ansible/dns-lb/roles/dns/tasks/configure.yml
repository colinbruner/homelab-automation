---
# Configures Technitium via its HTTP API.
# Requires technitium_token fact set by bootstrap.yml.
#
# validate_certs: false is required on all uri calls — when HTTP→HTTPS redirect
# is enabled, the uri module follows the 302 to https://127.0.0.1:<port> which
# fails cert validation (cert is for the node FQDN, not 127.0.0.1). All calls
# are localhost-only so skipping validation is safe.

- name: get current settings
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/settings/get"
    method: GET
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  register: technitium_settings
  #no_log: true

- name: enable https on technitium web service
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/settings/set"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
      webServiceEnableTls: "true"
      webServiceHttpToTlsRedirect: "true"
      webServiceTlsPort: "{{ technitium_https_port }}"
      webServiceTlsCertificatePath: "{{ technitium_cert_pfx_path }}"
      webServiceTlsCertificatePassword: "{{ technitium_cert_pfx_password }}"
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  when: >
    not (technitium_settings.json.response.webServiceEnableTls | default(false)) or
    (technitium_settings.json.response.webServiceTlsCertificatePath | default('')) != technitium_cert_pfx_path
  #no_log: true

# Create a local primary zone so both Technitium instances authoritatively resolve
# the node FQDNs and shared dns. entry to private IPs (split-horizon).
- name: create local zone for node fqdn resolution
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/zones/create"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
      zone: "{{ technitium_local_zone }}"
      type: Primary
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  register: zone_create_result
  failed_when:
    - zone_create_result.json.status == "error"
    - '"already exists" not in (zone_create_result.json.errorMessage | default(""))'
  #no_log: true
  when: technitium_local_records | length > 0

- name: add local dns records
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/zones/records/add"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
      zone: "{{ technitium_local_zone }}"
      domain: "{{ item.domain }}"
      type: "{{ item.type }}"
      ttl: 300
      rdata: "{{ item.rdata }}"
      overwrite: "true"
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  loop: "{{ technitium_local_records }}"
  #no_log: true
  when: technitium_local_records | length > 0
