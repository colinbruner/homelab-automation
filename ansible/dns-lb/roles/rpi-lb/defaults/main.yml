---
# Caddy version — update to latest stable before running
# Check: https://github.com/caddyserver/caddy/releases
caddy_version: "v2.9.1"
caddy_arch: "arm64"

# Download URL for Caddy with cloudflare DNS-01 and caddy-security (OIDC) plugins
caddy_download_url: >-
  https://caddyserver.com/api/download?os=linux&arch={{ caddy_arch }}&caddy_version={{ caddy_version }}&p=github.com/caddy-dns/cloudflare&p=github.com/greenpau/caddy-security

# Caddy GPG key and apt repository
caddy_gpg_url: "https://dl.cloudsmith.io/public/caddy/stable/gpg.key"
caddy_gpg_dest: "/usr/share/keyrings/caddy-stable-archive-keyring.gpg"
caddy_apt_repo_url: "https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt"
caddy_apt_file: "/etc/apt/sources.list.d/caddy-stable.list"

# Prerequisite packages
packages:
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https
  - curl

# Domain config
caddy_base_domain: "colinbruner.com"

# Hostname for the Caddy auth portal (handles OIDC login + callback)
# Register https://{{ caddy_auth_fqdn }}/auth/callback as redirect URI in Pocket ID
caddy_auth_fqdn: "lb.{{ caddy_base_domain }}"

# Cookie domain — leading dot allows sharing across all subdomains
caddy_cookie_domain: ".{{ caddy_base_domain }}"

# Pocket ID OIDC issuer URL
pocket_id_issuer_url: "https://auth.colinbruner.com"

# Backends to reverse-proxy
# Fields:
#   name            - label (used in Caddyfile comments)
#   fqdn            - full public hostname for this service
#   upstream        - single backend URL (scheme + host + port)
#   upstreams       - list of backend URLs for load balancing (use instead of upstream)
#   oidc_protected  - true = require Pocket ID login before proxying
#   tls_skip_verify - true = skip TLS verification on upstream (for self-signed certs)
caddy_backends:
  - name: truenas
    fqdn: "truenas.{{ caddy_base_domain }}"
    upstream: "https://192.168.10.50"
    oidc_protected: true
    tls_skip_verify: true

  - name: technitium-dns
    fqdn: "dns.{{ caddy_base_domain }}"
    upstreams:
      - "https://192.168.1.3:53443"
      - "https://192.168.1.4:53443"
    oidc_protected: true
    tls_skip_verify: true

