---
- name: install prerequisite packages
  ansible.builtin.apt:
    pkg: "{{ packages }}"
    state: present
    update_cache: true

# Convenience script handles ARM64 detection automatically
- name: install docker
  ansible.builtin.shell:
    cmd: "curl -fsSL https://get.docker.com | sh"
    creates: /usr/bin/docker

- name: add caddy gpg key
  ansible.builtin.shell:
    cmd: "curl -1sLf {{ caddy_gpg_url }} | gpg --dearmor -o {{ caddy_gpg_dest }}"
    creates: "{{ caddy_gpg_dest }}"

- name: add caddy apt repository
  ansible.builtin.shell:
    cmd: "curl -1sLf {{ caddy_apt_repo_url }} | tee {{ caddy_apt_file }}"
    creates: "{{ caddy_apt_file }}"
  notify: update apt cache

- name: flush handlers
  ansible.builtin.meta: flush_handlers

- name: install caddy base package
  ansible.builtin.apt:
    name: caddy
    state: present

- name: get installed caddy version
  ansible.builtin.command: caddy version
  register: caddy_installed_version
  failed_when: false
  changed_when: false

# Replaces the base caddy binary with a custom build that includes:
#   - caddy-dns/cloudflare  (DNS-01 TLS challenge)
#   - greenpau/caddy-security  (OIDC authentication portal)
# The Caddy download API compiles the binary on-demand — allow extra time
- name: download caddy with plugins
  ansible.builtin.get_url:
    url: "{{ caddy_download_url }}"
    dest: /usr/bin/caddy
    mode: "0755"
    owner: root
    group: root
    timeout: 300
  when: caddy_version not in (caddy_installed_version.stdout | default(''))
  notify: restart caddy
