---
# defaults file for pxe
packages: # noqa: var-naming[no-role-prefix]
  - xinetd # rsyslog and init script utilities
  - tftpd-hpa # serves pxeboot menu, files, vmlinuz, etc
  - nginx # serves ISOs
  - nfs-common # mounting nfs share
  - curl # used by scripts/download-talos-images.sh

# these packages provide ipxe files to serve over tftp
ipxe_packages: # noqa: var-naming[no-role-prefix]
  - ipxe
  - grub-efi-amd64-signed
  - shim-signed

directories: # noqa: var-naming[no-role-prefix]
  # tftp root — iPXE/grub/undionly files
  - /srv/backup/homelab/pxe/tftp
  # contains vmlinuz, initrd, etc
  - /srv/backup/homelab/pxe/tftp/images
  # files served by NGINX (e.g. ISOs)
  - /srv/backup/homelab/pxe/http

# The path on the PXE server to mount 'nfs_server_share_path'
pxe_nfs_share_path: "/srv/backup/homelab"
# IP Address or DNS for PXE Server (tftp, nginx)
pxe_server_addr: "192.168.10.4"
# The NGINX root path to serve images from
pxe_http_root_path: "/srv/backup/homelab/pxe/http"
# The TFTP root — iPXE/grub/undionly files live here
pxe_tftp_root_path: "/srv/backup/homelab/pxe/tftp"
# The path to copy vmlinuz, initrd, etc (subdir of pxe_tftp_root_path)
pxe_tftp_boot_path: "/srv/backup/homelab/pxe/tftp/images"

# IP Address or DNS for NFS Server (images/isos)
nfs_server_addr: "192.168.10.5" # noqa: var-naming[no-role-prefix]
# The NFS Server Share to mount locally to PXE Server
nfs_server_share_path: "/var/nfs/shared/homelab" # noqa: var-naming[no-role-prefix]

# default ipxe installed files to copy and serve via tftp
ipxe_files_served_by_tftp: # noqa: var-naming[no-role-prefix]
  # - /usr/lib/ipxe/undionly.kpxe # NOTE: Custom built, installed from files/undionly.kpxe
  - /usr/lib/ipxe/ipxe.efi
  - /usr/lib/ipxe/snponly.efi

grub_files_served_by_tftp: # noqa: var-naming[no-role-prefix]
  - /usr/lib/shim/shimx64.efi.signed
  - /usr/lib/grub/x86_64-efi-signed/grubnetx64.efi.signed

###
# Talos
###
talos_linux_architectures: # noqa: var-naming[no-role-prefix]
  - amd64
  - arm64
