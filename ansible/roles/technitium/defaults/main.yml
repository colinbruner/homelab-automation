---
# Technitium DNS Server
technitium_install_script: "https://download.technitium.com/dns/install.sh"
technitium_service: "dns"
technitium_data_dir: "/etc/dns"
technitium_install_dir: "/usr/share/technitium-dns-server"

# Technitium API — credentials must be supplied via vars (e.g. from 1Password)
# technitium_admin_user and technitium_admin_password are required for configure.yml
technitium_admin_user: "admin"
technitium_http_port: 5380
technitium_https_port: 53443

# Let's Encrypt / certbot (DNS-01 via Cloudflare)
# cloudflare_api_token must be supplied via vars (same token used by Caddy)
# technitium_cert_domain must be set per-host in host_vars/ — e.g. ns1.colinbruner.com
technitium_cert_domain: ""
technitium_cert_email: "admin@colinbruner.com"
technitium_cert_pfx_path: "/etc/dns/cert.pfx"
technitium_cert_pfx_password: ""
technitium_cloudflare_credentials: "/etc/letsencrypt/cloudflare.ini"
# Extra seconds to wait for Cloudflare DNS propagation before ACME validation
technitium_dns_propagation_seconds: 30

# Local DNS zone and records created on each Technitium instance.
# Provides split-horizon resolution so node FQDNs and the shared dns. entry
# resolve to private IPs on this network.
technitium_local_zone: ""
technitium_local_records: []

# NFS backup
nfs_server: "192.168.10.5"  # noqa: var-naming[no-role-prefix]
nfs_export: "/var/nfs/shared/homelab"  # noqa: var-naming[no-role-prefix]
nfs_mount_point: "/mnt/backup/homelab"  # noqa: var-naming[no-role-prefix]
nfs_mount_opts: "rw,sync,hard,intr,rsize=8192,wsize=8192"  # noqa: var-naming[no-role-prefix]

# Backup retention (days)
backup_retain_days: 7  # noqa: var-naming[no-role-prefix]
# Time to run nightly backup (systemd OnCalendar format)
backup_schedule: "02:00:00"  # noqa: var-naming[no-role-prefix]
