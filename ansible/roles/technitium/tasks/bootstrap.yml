---
# Bootstraps Technitium credentials on a fresh install.
#
# Technitium defaults to admin/admin on first install. This task set:
#   1. Tries the configured password first  — no-op on subsequent runs
#   2. Falls back to admin/admin           — handles fresh installs
#   3. Sets the password to the configured value when default was used
#   4. Sets technitium_token fact for use by configure.yml
#
# validate_certs: false is required on all uri calls — when HTTP→HTTPS redirect
# is enabled, the uri module follows the 302 to https://127.0.0.1:<port> which
# fails cert validation (cert is for the node FQDN, not 127.0.0.1). All calls
# are localhost-only so skipping validation is safe.

- name: Wait for technitium http api to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ technitium_http_port }}"
    delay: 2
    timeout: 30

- name: Try login with configured password  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/user/login"
    method: GET
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user }}"
      pass: "{{ technitium_admin_password }}"
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  register: login_configured
  failed_when: false
  no_log: true

- name: Try login with default credentials (fresh install)  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/user/login"
    method: GET
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user }}"
      pass: "admin"
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  register: login_default
  failed_when: false
  no_log: true
  when: (login_configured.json | default({})).status | default('') != 'ok'

- name: Fail if neither login succeeded
  ansible.builtin.fail:
    msg: >
      Could not authenticate to Technitium with the configured password or the
      default admin/admin credentials. Verify technitium_admin_password in
      1Password or check if Technitium started correctly.
  when:
    - (login_configured.json | default({})).status | default('') != 'ok'
    - (login_default.json | default({})).status | default('') != 'ok'

- name: Set auth token fact
  ansible.builtin.set_fact:
    technitium_token: >-
      {{ login_configured.json.token
         if (login_configured.json | default({})).status | default('') == 'ok'
         else login_default.json.token }}
  no_log: true

- name: Set admin password from default (first run)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ technitium_http_port }}/api/user/changePassword"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
      pass: "{{ technitium_admin_password }}"
    validate_certs: false
    follow_redirects: all
    return_content: true
    status_code: 200
  when: (login_configured.json | default({})).status | default('') != 'ok'
  no_log: true
