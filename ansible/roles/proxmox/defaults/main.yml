# ACME / Let's Encrypt
acme_account_name: default # noqa: var-naming[no-role-prefix]
acme_directory: https://acme-v02.api.letsencrypt.org/directory # noqa: var-naming[no-role-prefix]

# acme_contact: must be provided at runtime (email address)
# e.g. -e "acme_contact=admin@example.com"

# Cloudflare DNS plugin
acme_dns_plugin_id: cloudflare # noqa: var-naming[no-role-prefix]
acme_dns_plugin: cf # noqa: var-naming[no-role-prefix]

# cloudflare_token and cloudflare_account_id must be provided at runtime
# e.g. via scripts/run-proxmox.sh which pulls them from 1Password

# acme_domain: set per-host in inventory/host_vars/

# OIDC / Pocket ID
oidc_realm_name: pocket-id # noqa: var-naming[no-role-prefix]
oidc_username_claim: preferred_username # noqa: var-naming[no-role-prefix]
oidc_scopes: "openid email profile groups" # noqa: var-naming[no-role-prefix]
oidc_groups_claim: groups # noqa: var-naming[no-role-prefix]
oidc_autocreate: true # noqa: var-naming[no-role-prefix]
oidc_default_realm: true # noqa: var-naming[no-role-prefix]
oidc_comment: Pocket ID # noqa: var-naming[no-role-prefix]

# Group → role mappings applied at the root path (/)
oidc_group_role_mappings: # noqa: var-naming[no-role-prefix]
  - group: admin
    role: Administrator
  - group: readonly
    role: PVEAuditor

# oidc_issuer_url, oidc_client_id, oidc_client_secret must be provided at runtime
# e.g. via scripts/run-proxmox.sh which pulls them from 1Password
