# ACME / Let's Encrypt
proxmox_acme_account_name: default
proxmox_acme_directory: https://acme-v02.api.letsencrypt.org/directory

# proxmox_acme_contact: must be provided at runtime (email address)
# e.g. -e "proxmox_acme_contact=admin@example.com"

# Cloudflare DNS plugin
proxmox_acme_dns_plugin_id: cloudflare
proxmox_acme_dns_plugin: cf

# proxmox_cloudflare_token and proxmox_cloudflare_account_id are resolved at
# runtime from 1Password Connect via group_vars/proxmox.yml lookups

# proxmox_acme_domain: set per-host in inventory/host_vars/

# OIDC / Pocket ID
proxmox_oidc_realm_name: pocket-id
proxmox_oidc_username_claim: preferred_username
proxmox_oidc_scopes: "openid email profile groups"
proxmox_oidc_groups_claim: groups
proxmox_oidc_autocreate: true
proxmox_oidc_default_realm: true
proxmox_oidc_comment: Pocket ID

# Group → role mappings applied at the root path (/)
proxmox_oidc_group_role_mappings:
  - group: admin
    role: Administrator
  - group: readonly
    role: PVEAuditor

# proxmox_oidc_issuer_url, proxmox_oidc_client_id, proxmox_oidc_client_secret are
# resolved at runtime from 1Password Connect via group_vars/proxmox.yml lookups
