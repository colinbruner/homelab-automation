---
###############################################################################
# ACME / Let's Encrypt via Cloudflare DNS-01
#
# Cluster-level tasks (run_once): ACME account + DNS plugin
# Node-level tasks: domain config + certificate order
###############################################################################

# ─── Cluster-level ────────────────────────────────────────────────────────────

- name: Check existing acme accounts
  ansible.builtin.command: pvenode acme account list
  register: proxmox_acme_account_list
  changed_when: false
  run_once: true

- name: Register acme account with let's encrypt # noqa: no-changed-when risky-shell-pipe
  ansible.builtin.shell: |
    echo "y" | pvenode acme account register {{ proxmox_acme_account_name }} {{ proxmox_acme_contact }} \
      --directory {{ proxmox_acme_directory }}
  run_once: true
  when: proxmox_acme_account_name not in proxmox_acme_account_list.stdout

- name: Check existing acme dns plugins
  ansible.builtin.command: pvenode acme plugin list
  register: proxmox_acme_plugin_list
  changed_when: false
  run_once: true

- name: Write cloudflare credentials to temp file
  ansible.builtin.copy:
    content: "CF_Token={{ proxmox_cloudflare_token }}\nCF_Account_ID={{ proxmox_cloudflare_account_id }}\n"
    dest: /tmp/cf-acme-creds.conf
    mode: "0600"
  run_once: true
  no_log: true
  when: proxmox_acme_dns_plugin_id not in proxmox_acme_plugin_list.stdout

- name: Configure cloudflare dns plugin # noqa: no-changed-when
  ansible.builtin.command: >-
    pvenode acme plugin add dns {{ proxmox_acme_dns_plugin_id }}
    --api {{ proxmox_acme_dns_plugin }}
    --data /tmp/cf-acme-creds.conf
  run_once: true
  when: proxmox_acme_dns_plugin_id not in proxmox_acme_plugin_list.stdout

- name: Remove cloudflare credentials temp file
  ansible.builtin.file:
    path: /tmp/cf-acme-creds.conf
    state: absent
  run_once: true

# ─── Per-node ─────────────────────────────────────────────────────────────────

- name: Get node config
  ansible.builtin.command: pvesh get /nodes/{{ ansible_hostname }}/config --output-format json
  register: proxmox_node_config
  changed_when: false

- name: Configure acme domain on node # noqa: no-changed-when
  ansible.builtin.command: >-
    pvesh set /nodes/{{ ansible_hostname }}/config
    --acmedomain0 domain={{ proxmox_acme_domain }},plugin={{ proxmox_acme_dns_plugin_id }}
  when: proxmox_acme_domain not in proxmox_node_config.stdout

- name: Check if acme certificate exists
  ansible.builtin.stat:
    path: /etc/pve/nodes/{{ ansible_hostname }}/pveproxy-ssl.pem
  register: proxmox_acme_cert

- name: Order acme certificate # noqa: no-changed-when
  ansible.builtin.command: pvenode acme cert order
  when: not proxmox_acme_cert.stat.exists
  async: 300
  poll: 15
