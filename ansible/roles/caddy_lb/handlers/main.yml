---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reload caddy
  ansible.builtin.service:
    name: caddy
    state: reloaded

- name: Restart caddy
  ansible.builtin.service:
    name: caddy
    state: restarted
