---
- name: Install prerequisite packages
  ansible.builtin.apt:
    pkg: "{{ caddy_lb_packages }}"
    state: present
    update_cache: true

# Convenience script handles ARM64 detection automatically
- name: Install docker  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: "curl -fsSL https://get.docker.com | sh"
    creates: /usr/bin/docker

- name: Add caddy apt repository
  ansible.builtin.deb822_repository:
    name: caddy-stable
    types: [deb]
    uris: https://dl.cloudsmith.io/public/caddy/stable/deb/debian
    suites: any-version
    components: [main]
    signed_by: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
  register: caddy_lb_repo

- name: Update apt cache after repo change  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: caddy_lb_repo is changed

- name: Install caddy base package
  ansible.builtin.apt:
    name: caddy
    state: present

- name: Get installed caddy version
  ansible.builtin.command: caddy version
  register: caddy_lb_installed_version
  failed_when: false
  changed_when: false

# Replaces the base caddy binary with a custom build that includes:
#   - caddy-dns/cloudflare  (DNS-01 TLS challenge)
#   - greenpau/caddy-security  (OIDC authentication portal)
# The Caddy download API compiles the binary on-demand — allow extra time
- name: Download caddy with plugins
  ansible.builtin.get_url:
    url: "{{ caddy_lb_download_url }}"
    dest: /usr/bin/caddy
    mode: "0755"
    owner: root
    group: root
    timeout: 300
  when: caddy_lb_version not in (caddy_lb_installed_version.stdout | default(''))
  notify: Restart caddy
