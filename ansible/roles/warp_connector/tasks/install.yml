---

- name: Install prerequisite packages
  ansible.builtin.apt:
    pkg: "{{ warp_connector_packages }}"
    update_cache: true

- name: Add cloudflare warp apt repository
  ansible.builtin.deb822_repository:
    name: cloudflare-warp
    types: [deb]
    uris: https://pkg.cloudflareclient.com/
    suites: "{{ ansible_distribution_release }}"
    components: [main]
    signed_by: https://pkg.cloudflareclient.com/pubkey.gpg
  register: warp_connector_repo

- name: Update apt cache after repo change  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: warp_connector_repo is changed

- name: Install cloudflare-warp
  ansible.builtin.apt:
    name: cloudflare-warp
    state: present
