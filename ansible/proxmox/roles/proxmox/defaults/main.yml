# ACME / Let's Encrypt
acme_account_name: default
acme_directory: https://acme-v02.api.letsencrypt.org/directory

# acme_contact: must be provided at runtime (email address)
# e.g. -e "acme_contact=admin@example.com"

# Cloudflare DNS plugin
acme_dns_plugin_id: cloudflare
acme_dns_plugin: cf

# cloudflare_token and cloudflare_account_id must be provided at runtime
# e.g. via configure.sh which pulls them from 1Password

# acme_domain: set per-host in inventory/host_vars/

# OIDC / Pocket ID
oidc_realm_name: pocket-id
oidc_username_claim: preferred_username
oidc_scopes: "openid email profile groups"
oidc_groups_claim: groups
oidc_autocreate: true
oidc_default_realm: true
oidc_comment: Pocket ID

# Group → role mappings applied at the root path (/)
oidc_group_role_mappings:
  - group: admin
    role: Administrator
  - group: readonly
    role: PVEAuditor

# oidc_issuer_url, oidc_client_id, oidc_client_secret must be provided at runtime
# e.g. via configure.sh which pulls them from 1Password
