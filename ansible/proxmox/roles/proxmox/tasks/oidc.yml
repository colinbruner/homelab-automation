---
###############################################################################
# OIDC / OpenID Connect via Pocket ID
#
# Configures a Proxmox OpenID Connect realm pointing at Pocket ID.
# Cluster-level: realm is shared across all nodes via /etc/pve/, run once.
###############################################################################

- name: check existing authentication realms
  ansible.builtin.command: pveum realm list --output-format json
  register: realm_list
  changed_when: false
  run_once: true

- name: configure pocket-id oidc realm
  ansible.builtin.command: >-
    pveum realm add {{ oidc_realm_name }}
    --type openid
    --issuer-url {{ oidc_issuer_url }}
    --client-id {{ oidc_client_id }}
    --client-key {{ oidc_client_secret }}
    --username-claim {{ oidc_username_claim }}
    --scopes "{{ oidc_scopes }}"
    --groups-claim {{ oidc_groups_claim }}
    --autocreate {{ oidc_autocreate | int }}
    --comment "{{ oidc_comment }}"
  run_once: true
  no_log: true
  when: oidc_realm_name not in realm_list.stdout

- name: get current realm config
  ansible.builtin.command: pvesh get /access/domains/{{ oidc_realm_name }} --output-format json
  register: realm_config
  changed_when: false
  run_once: true
  when: oidc_realm_name in realm_list.stdout

- name: check if realm config has drifted
  ansible.builtin.set_fact:
    oidc_realm_drifted: >-
      {{
        (realm_config.stdout | from_json).get('username-claim') != oidc_username_claim or
        (realm_config.stdout | from_json).get('issuer-url')     != oidc_issuer_url or
        (realm_config.stdout | from_json).get('client-id')      != oidc_client_id or
        (realm_config.stdout | from_json).get('scopes')         != oidc_scopes or
        (realm_config.stdout | from_json).get('groups-claim')   != oidc_groups_claim
      }}
  run_once: true
  when: oidc_realm_name in realm_list.stdout

- name: delete pocket-id oidc realm (config has drifted)
  ansible.builtin.command: pveum realm del {{ oidc_realm_name }}
  run_once: true
  when:
    - oidc_realm_name in realm_list.stdout
    - oidc_realm_drifted | default(false)

- name: recreate pocket-id oidc realm (config has drifted)
  ansible.builtin.command: >-
    pveum realm add {{ oidc_realm_name }}
    --type openid
    --issuer-url {{ oidc_issuer_url }}
    --client-id {{ oidc_client_id }}
    --client-key {{ oidc_client_secret }}
    --username-claim {{ oidc_username_claim }}
    --scopes "{{ oidc_scopes }}"
    --groups-claim {{ oidc_groups_claim }}
    --autocreate {{ oidc_autocreate | int }}
    --comment "{{ oidc_comment }}"
  run_once: true
  no_log: true
  when:
    - oidc_realm_name in realm_list.stdout
    - oidc_realm_drifted | default(false)

# ─── Default realm ────────────────────────────────────────────────────────────

- name: set pocket-id as default login realm
  ansible.builtin.command: pveum realm modify {{ oidc_realm_name }} --default 1
  run_once: true
  when: oidc_default_realm | bool

# ─── Group → role mappings ────────────────────────────────────────────────────

- name: get existing groups
  ansible.builtin.command: pveum group list --output-format json
  register: pve_groups
  changed_when: false
  run_once: true

- name: ensure oidc groups exist
  ansible.builtin.command: pveum group add {{ item.group }}
  run_once: true
  when: item.group not in pve_groups.stdout
  loop: "{{ oidc_group_role_mappings }}"

- name: assign roles to groups at root path
  ansible.builtin.command: >-
    pveum aclmod /
    --groups {{ item.group }}
    --role {{ item.role }}
  run_once: true
  loop: "{{ oidc_group_role_mappings }}"
