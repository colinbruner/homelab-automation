---
- name: Gather proxmox node capacity facts
  hosts: proxmox
  gather_facts: false
  vars_files:
    - vars/workers.yml
  roles:
    - role: proxmox_facts
      vars:
        proxmox_facts_endpoints:
          - status
          - storage

- name: Validate config and register target nodes
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/workers.yml

  tasks:
    - name: Validate node references
      ansible.builtin.fail:
        msg: >-
          Worker '{{ item.name }}' references node '{{ item.node }}' which is not in
          the [proxmox] inventory group. Valid nodes: {{ groups['proxmox'] | join(', ') }}
      loop: "{{ workers }}"
      when: item.node not in groups['proxmox']

    - name: Register unique target nodes into dynamic group
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: vm_target
        node_workers: "{{ workers | selectattr('node', 'equalto', item) | list }}"
      loop: "{{ workers | map(attribute='node') | unique | list }}"
      changed_when: false

    - name: Show placement summary
      ansible.builtin.debug:
        msg: "{{ item.name }} → {{ item.node }}"
      loop: "{{ workers }}"
      loop_control:
        label: "{{ item.name }}"

- name: Create talos worker VMs
  hosts: vm_target
  gather_facts: false
  vars_files:
    - vars/workers.yml
  roles:
    - role: proxmox_worker
      vars:
        proxmox_worker_vcpus: "{{ vm_vcpus }}"
        proxmox_worker_ram_mb: "{{ vm_ram_mb }}"
        proxmox_worker_disk_gb: "{{ vm_disk_gb }}"
        proxmox_worker_bridge: "{{ vm_bridge }}"
        proxmox_worker_storage: "{{ vm_storage }}"
